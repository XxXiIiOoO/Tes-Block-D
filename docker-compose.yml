services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  smtp-relay:
    image: boky/postfix
    environment:
      ALLOWED_SENDER_DOMAINS: blocktest.ru
      RELAYHOST: ""
    restart: always

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      smtp-relay:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./presets:/app/presets

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "taskiq", "worker", "app.workers.broker:broker", "app.workers.jobs"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./presets:/app/presets
      - /var/run/docker.sock:/var/run/docker.sock

  hardhat:
    build:
      context: ./presets/hardhat
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "const h=require('http');h.request({hostname:'localhost',port:8545,method:'POST',headers:{'Content-Type':'application/json'}},r=>{process.exit(0)}).on('error',()=>process.exit(1)).end('{\"jsonrpc\":\"2.0\",\"method\":\"net_version\",\"params\":[],\"id\":1}')"
      interval: 5s
      timeout: 5s
      retries: 30

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    ports:
      - "80:5173"
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
